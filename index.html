<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territory War 3</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; text-align: center; }
    h1 { margin: 20px; }
    #ruffle-player { width: 100%; max-width: 900px; height: 600px; margin: 0 auto; border: 2px solid #444; background: #000; }
    #error { color: #ff4444; margin: 20px; }
  </style>
</head>
<body>
  <h1>Territory War 3</h1>
  <div id="ruffle-player"></div>
  <div id="error" style="display:none;">If the game doesn't load, check console (F12) for errors — SWF might be missing or path wrong.</div>

  <script>
    window.RufflePlayer.config = {
      "publicPath": "https://unpkg.com/@ruffle-rs/ruffle/",
      "autoplay": "on",
      "unmuteOverlay": "hidden",
      "letterbox": "on",
      "warnOnUnsupportedContent": true
    };

    window.addEventListener("load", () => {
      const container = document.getElementById("ruffle-player");
      const ruffle = window.RufflePlayer.newest().createPlayer();
      container.appendChild(ruffle);

      // Change this path if SWF is in a subfolder, e.g. "games/Territory War 3.swf"
      ruffle.load("Territory War 3.swf").then(() => {
        console.log("Game loaded successfully!");
      }).catch(err => {
        console.error("Load failed:", err);
        document.getElementById("error").style.display = "block";
      });
    });
  </script>
</body>
</html>
